appId: com.codebasetracker
productName: codebase-tracker
directories:
  buildResources: resources # Changed from 'build' to 'resources' to use correct icon directory
  output: dist              # Specify output directory for built files
compression: normal
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: codebase-tracker
  icon: resources/icon.ico
  target: nsis              # NSIS installer for faster startup and professional installation

nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: Codebase Tracker
  uninstallDisplayName: Codebase Tracker
  createDesktopShortcut: always
  createStartMenuShortcut: true
  oneClick: false
  allowToChangeInstallationDirectory: true
  runAfterFinish: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
mac:
  icon: resources/icon.icns
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
  icon: resources/icon.png # Add icon configuration for Linux

deb:
  depends:
    - xclip
    - wl-clipboard
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
